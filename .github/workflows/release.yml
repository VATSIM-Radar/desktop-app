name: Release

on:
  push:
    branches:
      - main
    tags:
      - v*
  workflow_dispatch:
    inputs:
      channel:
        description: Release channel
        required: true
        default: next
        type: choice
        options:
          - next
          - prod

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.channel || (startsWith(github.ref, 'refs/tags/v') && 'prod' || 'next') }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.platform }} ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - os: windows-latest
            platform: win32
            arch: x64
          - os: macos-latest
            platform: darwin
            arch: x64
          - os: macos-latest
            platform: darwin
            arch: arm64
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg fakeroot

      - name: Install dependencies
        run: yarn install --immutable

      - name: Select release channel
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            channel="${{ inputs.channel }}"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            channel="prod"
          else
            channel="next"
          fi

          if [[ "$channel" == "next" ]]; then
            echo "RELEASE_CHANNEL=next" >> "$GITHUB_ENV"
            echo "VITE_DOMAIN=https://next.vatsim-radar.com" >> "$GITHUB_ENV"
          else
            echo "RELEASE_CHANNEL=prod" >> "$GITHUB_ENV"
            echo "VITE_DOMAIN=https://vatsim-radar.com" >> "$GITHUB_ENV"
          fi

          case "${{ matrix.platform }}" in
            darwin)
              echo "PACKAGER_ICON=./src/assets/icon.icns" >> "$GITHUB_ENV"
              echo "MAC_INSTALLER_ICON=src/assets/icon.icns" >> "$GITHUB_ENV"
              ;;
            linux)
              echo "PACKAGER_ICON=./src/assets/icon.png" >> "$GITHUB_ENV"
              ;;
            *)
              echo "PACKAGER_ICON=./src/assets/favicon.ico" >> "$GITHUB_ENV"
              ;;
          esac

      - name: Generate macOS icon
        if: matrix.platform == 'darwin'
        shell: bash
        run: |
          mkdir -p src/assets/icon.iconset

          for size in 16 32 128 256 512; do
            sips -z "$size" "$size" src/assets/icon.png --out "src/assets/icon.iconset/icon_${size}x${size}.png"
            retina_size=$((size * 2))
            sips -z "$retina_size" "$retina_size" src/assets/icon.png --out "src/assets/icon.iconset/icon_${size}x${size}@2x.png"
          done

          iconutil -c icns src/assets/icon.iconset -o src/assets/icon.icns

      - name: Make
        run: yarn make --platform=${{ matrix.platform }} --arch=${{ matrix.arch }}

      - name: Collect release files
        shell: bash
        run: |
          mkdir -p release-assets
          find out -maxdepth 4 -type f -print | sort
          find out -type f \( \
            -name '*.exe' -o \
            -name '*.dmg' -o \
            -name '*.deb' -o \
            -name '*.zip' -o \
            -name '*.nupkg' -o \
            -name 'RELEASES' \
          \) -exec cp {} release-assets/ \;
          find release-assets -maxdepth 1 -type f -print | sort
          test -n "$(find release-assets -maxdepth 1 -type f)"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vatsim-radar-${{ matrix.platform }}-${{ matrix.arch }}
          path: release-assets/*
          if-no-files-found: error

  publish:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Verify release files
        shell: bash
        run: |
          find release-assets -maxdepth 1 -type f -print | sort
          test -n "$(find release-assets -maxdepth 1 -type f)"

      - name: Select release channel
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            channel="${{ inputs.channel }}"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            channel="prod"
          else
            channel="next"
          fi

          echo "RELEASE_CHANNEL=$channel" >> "$GITHUB_ENV"

      - name: Prepare release metadata
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"

          if [[ "$RELEASE_CHANNEL" == "next" ]]; then
            release_tag="next-v${version}"
            prerelease="true"
            release_name="VATSIM Radar ${version} Next"
          else
            release_tag="v${version}"
            prerelease="false"
            release_name="VATSIM Radar ${version}"
          fi

          echo "RELEASE_TAG=$release_tag" >> "$GITHUB_ENV"
          echo "RELEASE_NAME=$release_name" >> "$GITHUB_ENV"
          echo "RELEASE_PRERELEASE=$prerelease" >> "$GITHUB_ENV"

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          prerelease: ${{ env.RELEASE_PRERELEASE }}
          fail_on_unmatched_files: true
          files: |
            release-assets/*

      - name: Add release links to summary
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          release_url="https://github.com/${{ github.repository }}/releases/download/${RELEASE_TAG}"
          {
            echo "### Release assets"
            echo
            echo "- [vatsim-radar-setup.exe](${release_url}/vatsim-radar-setup.exe)"
            echo "- [vatsim-radar-win32-x64.zip](${release_url}/vatsim-radar-win32-x64.zip)"
            echo "- [vatsim-radar-darwin-x64.dmg](${release_url}/vatsim-radar-darwin-x64.dmg)"
            echo "- [vatsim-radar-darwin-x64.zip](${release_url}/vatsim-radar-darwin-x64.zip)"
            echo "- [vatsim-radar-darwin-arm64.dmg](${release_url}/vatsim-radar-darwin-arm64.dmg)"
            echo "- [vatsim-radar-darwin-arm64.zip](${release_url}/vatsim-radar-darwin-arm64.zip)"
            echo "- [vatsim-radar-linux-x64.deb](${release_url}/vatsim-radar-linux-x64.deb)"
            echo "- [vatsim-radar-linux-x64.zip](${release_url}/vatsim-radar-linux-x64.zip)"
            echo "- [vatsim-radar-linux-arm64.deb](${release_url}/vatsim-radar-linux-arm64.deb)"
            echo "- [vatsim-radar-linux-arm64.zip](${release_url}/vatsim-radar-linux-arm64.zip)"
            echo
            echo "### Update feeds"
            echo
            echo "- [Windows x64](https://update.electronjs.org/${{ github.repository }}/win32-x64/${version})"
            echo "- [macOS x64](https://update.electronjs.org/${{ github.repository }}/darwin-x64/${version})"
            echo "- [macOS arm64](https://update.electronjs.org/${{ github.repository }}/darwin-arm64/${version})"
          } >> "$GITHUB_STEP_SUMMARY"
