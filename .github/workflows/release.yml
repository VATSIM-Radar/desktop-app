name: Release

on:
  workflow_dispatch:
    inputs:
      channel:
        description: Release channel
        required: true
        default: next
        type: choice
        options:
          - next
          - prod

permissions:
  contents: write

env:
  RELEASE_CHANNEL: ${{ inputs.channel }}
  VITE_DOMAIN: ${{ inputs.channel == 'next' && 'https://next.vatsim-radar.com' || 'https://vatsim-radar.com' }}

concurrency:
  group: release-${{ inputs.channel }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build ${{ matrix.platform }} ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - os: windows-latest
            platform: win32
            arch: x64
          - os: macos-latest
            platform: darwin
            arch: x64
          - os: macos-latest
            platform: darwin
            arch: arm64
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg fakeroot

      - name: Install dependencies
        run: yarn install

      - name: Select platform icons
        run: |
          case "${{ matrix.platform }}" in
            darwin)
              echo "PACKAGER_ICON=./src/assets/icon.icns" >> "$GITHUB_ENV"
              echo "MAC_INSTALLER_ICON=src/assets/icon.icns" >> "$GITHUB_ENV"
              ;;
            linux)
              echo "PACKAGER_ICON=./src/assets/icon.png" >> "$GITHUB_ENV"
              ;;
            *)
              echo "PACKAGER_ICON=./src/assets/favicon.ico" >> "$GITHUB_ENV"
              ;;
          esac

      - name: Generate macOS icon
        if: matrix.platform == 'darwin'
        run: |
          cd "$GITHUB_WORKSPACE"
          mkdir -p src/assets/icon.iconset

          for size in 16 32 128 256 512; do
            sips -z "$size" "$size" src/assets/icon.png --out "src/assets/icon.iconset/icon_${size}x${size}.png"
            retina_size=$((size * 2))
            sips -z "$retina_size" "$retina_size" src/assets/icon.png --out "src/assets/icon.iconset/icon_${size}x${size}@2x.png"
          done

          iconutil -c icns src/assets/icon.iconset -o src/assets/icon.icns

      - name: Make
        run: yarn electron-forge make --platform=${{ matrix.platform }} --arch=${{ matrix.arch }}

      - name: Verify macOS signature
        if: matrix.platform == 'darwin'
        run: |
          app_path="$(find out -maxdepth 2 -type d -name '*.app' | head -n 1)"
          test -n "$app_path"
          codesign --verify --deep --strict --verbose=2 "$app_path"

      - name: Collect release files
        run: |
          cd "$GITHUB_WORKSPACE"
          mkdir -p release-assets
          find out \
            -type f \( \
              -name 'vatsim-radar-setup.exe' -o \
              -name 'vatsim-radar-*.dmg' -o \
              -name 'vatsim-radar-*.deb' -o \
              -name 'vatsim-radar-*.zip' -o \
              -name '*.nupkg' -o \
              -name 'RELEASES' \
          \) -exec cp {} release-assets/ \;
          find release-assets -maxdepth 1 -type f -print | sort
          test -n "$(find release-assets -maxdepth 1 -type f)"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vatsim-radar-${{ matrix.platform }}-${{ matrix.arch }}
          path: release-assets/*
          if-no-files-found: error

  publish:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Verify release files
        run: |
          find release-assets -maxdepth 1 -type f -print | sort
          test -n "$(find release-assets -maxdepth 1 -type f)"

      - name: Prepare release metadata
        run: |
          version="$(node -p "require('./package.json').version")"

          if [[ "$RELEASE_CHANNEL" == "next" ]]; then
            release_tag="next-v${version}"
            prerelease="true"
            release_name="VATSIM Radar ${version} Next"
          else
            release_tag="v${version}"
            prerelease="false"
            release_name="VATSIM Radar ${version}"
          fi

          echo "RELEASE_TAG=$release_tag" >> "$GITHUB_ENV"
          echo "RELEASE_NAME=$release_name" >> "$GITHUB_ENV"
          echo "RELEASE_PRERELEASE=$prerelease" >> "$GITHUB_ENV"

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          prerelease: ${{ env.RELEASE_PRERELEASE }}
          fail_on_unmatched_files: true
          files: |
            release-assets/*

      - name: Add release links to summary
        run: |
          version="$(node -p "require('./package.json').version")"
          release_url="https://github.com/${{ github.repository }}/releases/download/${RELEASE_TAG}"
          {
            echo "### Release assets"
            echo
            echo "ZIP assets are portable builds."
            echo
            find release-assets -maxdepth 1 -type f -printf '%f\n' | sort | while read -r asset; do
              echo "- [${asset}](${release_url}/${asset})"
            done
            echo
            echo "### Update feeds"
            echo
            echo "- [Windows x64](https://update.electronjs.org/${{ github.repository }}/win32-x64/${version})"
            echo "- [macOS x64](https://update.electronjs.org/${{ github.repository }}/darwin-x64/${version})"
            echo "- [macOS arm64](https://update.electronjs.org/${{ github.repository }}/darwin-arm64/${version})"
          } >> "$GITHUB_STEP_SUMMARY"
